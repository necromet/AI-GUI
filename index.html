<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff4444' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z'/></svg>" />
    <title>Work Ship</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              sidebar: '#000000',
              main: '#050505',
              input: '#121212',
              hover: '#1a1a1a',
              user: '#1a1a1a',
              neon: {
                blue: '#ff4444',
                purple: '#ff6666',
                green: '#ff8888',
                red: '#ff4444',
              }
            },
            fontFamily: {
              sans: ['Söhne', 'ui-sans-serif', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'Ubuntu', 'Cantarell', 'Noto Sans', 'sans-serif', 'Helvetica Neue', 'Arial', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji'],
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
            },
            keyframes: {
              glow: {
                '0%': { boxShadow: '0 0 5px #ff4444' },
                '100%': { boxShadow: '0 0 20px #ff4444, 0 0 10px #ff6666' },
              }
            }
          },
        },
      }
    </script>
    <style>
      :root {
        --neon-rgb: 248, 113, 113; /* Red default */
        --neon-color: rgb(248, 113, 113);
      }

      body {
        background-color: #050505;
        color: #ececec;
      }
      
      /* Neon Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #000; 
      }
      ::-webkit-scrollbar-thumb {
        background: #333; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--neon-color); 
        box-shadow: 0 0 10px var(--neon-color);
      }

      .scrollbar-hidden::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hidden {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Markdown styles simulation */
      .prose pre {
        background-color: #000000 !important;
        border: 0px;
        border-radius: 0.5rem;
        padding: 1rem;
        margin-top: 1rem;
        margin-bottom: 1rem;
        overflow-x: auto;
      }
      
      /* Neon code block styling */
      .prose .neon-code-block-container {
        background-color: transparent !important;
        border: none;
        border-radius: 1rem;
        padding-top: 1.5rem;
        padding-bottom: 0rem;
        padding-right: 0rem;
        padding-left: 0rem;
        box-shadow: none;
        transition: all 0.3s ease;
        overflow: hidden;
        background: #000000 !important;
        margin: 0 !important;
      }
      
      .code-block-wrapper:hover .neon-code-block-container {
        background: #000000 !important;
      }
      
      /* Override syntax highlighter styles for neon theme */
      .prose pre[class*="language-"] {
        margin: 0 !important;
        border-radius: 0.5rem !important;
      }
      .prose code {
        background-color: rgba(var(--neon-rgb), 0.1);
        color: var(--neon-color);
        border-radius: 0.25rem;
        padding: 0.2em 0.4em;
        font-size: 0.875em;
      }
      .prose pre code {
        background-color: transparent;
        color: inherit;
        padding: 0;
      }
      .prose p {
        margin-bottom: 1.25em;
      }
      .prose hr {
        margin-top: 3em;
        margin-bottom: 3em;
        border: none;
        border-top: 1px solid rgba(var(--neon-rgb), 0.3);
      }
      .prose strong {
        color: #fff;
        text-shadow: 0 0 2px rgba(255,255,255,0.5);
      }
      .prose a {
        color: var(--neon-color);
        text-decoration: underline;
      }
      
      /* Neon Selection */
      ::selection {
        background: var(--neon-color);
        color: #fff;
      }

      .glass-panel {
        background: rgba(20, 20, 20, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* Dynamic Neon Color Utilities */
      .neon-text {
        color: var(--neon-color);
      }
      .neon-border {
        border-color: var(--neon-color);
      }
      .neon-bg {
        background-color: var(--neon-color);
      }
      .neon-shadow {
        box-shadow: 0 0 20px rgba(var(--neon-rgb), 0.6);
      }
      .neon-glow {
        box-shadow: 0 0 10px rgba(var(--neon-rgb), 0.3),
                    0 0 20px rgba(var(--neon-rgb), 0.15);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
