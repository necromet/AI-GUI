<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff4444' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M21 7 6.82 21.18a2.83 2.83 0 0 1-3.99-.01a2.83 2.83 0 0 1 0-4L17 3'/><path d='m16 2 6 6'/><path d='M12 16H4'/></svg>" />
    <title>edward:labs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Fredoka:wght@300;400;500;600;700&family=Comfortaa:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css" integrity="sha384-zh0CIsljlf0E7dkDB76R3G6/58r08Bb2MFkR3lA9q9X8sYoQ6O1wVq896v8Q4lB" crossorigin="anonymous">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              sidebar: '#000000',
              main: '#050505',
              input: '#121212',
              hover: '#1a1a1a',
              user: '#1a1a1a',
              neon: {
                blue: '#ff4444',
                purple: '#ff6666',
                green: '#ff8888',
                red: '#ff4444',
              }
            },
            fontFamily: {
              sans: ['Fredoka', 'Comfortaa', 'Google Sans', 'ui-sans-serif', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'Ubuntu', 'Cantarell', 'Noto Sans', 'sans-serif'],
            },
            keyframes: {
              glow: {
                '0%': { boxShadow: '0 0 5px #ff4444' },
                '100%': { boxShadow: '0 0 20px #ff4444, 0 0 10px #ff6666' },
              },
              shake: {
                '0%, 100%': { transform: 'translateX(0)' },
                '10%, 30%, 50%, 70%, 90%': { transform: 'translateX(-4px)' },
                '20%, 40%, 60%, 80%': { transform: 'translateX(4px)' },
              },
              'fade-in': {
                '0%': { opacity: '0', transform: 'translateY(4px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'message-in': {
                '0%': { opacity: '0', transform: 'translateY(8px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'dropdown-in': {
                '0%': { opacity: '0', transform: 'scale(0.95) translateY(-4px)' },
                '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
              },
              'pulse-dot': {
                '0%, 100%': { opacity: '0.3', transform: 'scale(0.8)' },
                '50%': { opacity: '1', transform: 'scale(1.2)' },
              },
              'pulse-glow': {
                '0%, 100%': { opacity: '0.02', transform: 'scale(1)' },
                '50%': { opacity: '0.04', transform: 'scale(1.05)' },
              },
              'float': {
                '0%, 100%': { transform: 'translate(0, 0)' },
                '50%': { transform: 'translate(20px, -20px)' },
              },
              'orbit': {
                '0%': { transform: 'rotate(0deg)' },
                '100%': { transform: 'rotate(360deg)' },
              },
              'slide-in-from-top': {
                '0%': { transform: 'translateY(-100%)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              spin: {
                '0%': { transform: 'rotate(0deg)' },
                '100%': { transform: 'rotate(360deg)' },
              },
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
              'shake': 'shake 0.5s ease-in-out',
              'fade-in': 'fade-in 0.3s ease-out forwards',
              'message-in': 'message-in 0.4s ease-out forwards',
              'dropdown-in': 'dropdown-in 0.2s ease-out forwards',
              'pulse-dot': 'pulse-dot 1.4s ease-in-out infinite',
              'pulse-glow': 'pulse-glow 4s ease-in-out infinite',
              'float': 'float 8s ease-in-out infinite',
              'orbit': 'orbit 6s linear infinite',
              'slide-in-from-top': 'slide-in-from-top 0.3s ease-out forwards',
              'spin': 'spin 1s linear infinite',
              'spin-slow': 'spin 3s linear infinite',
            },
          },
        },
      }
    </script>
    <style>
      :root {
        --neon-rgb: 248, 113, 113;
        --neon-color: rgb(248, 113, 113);
        --neon-secondary-rgb: 34, 211, 238;
        --neon-secondary: rgb(34, 211, 238);
        --neon-accent-rgb: 192, 132, 252;
        --neon-accent: rgb(192, 132, 252);
        --app-font-size: 15px;
        --app-font-family: 'Fredoka', 'Comfortaa', 'Google Sans', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Ubuntu, Cantarell, 'Noto Sans', sans-serif;
      }

      html {
        font-size: var(--app-font-size, 15px);
        font-family: var(--app-font-family);
      }

      body {
        background-color: #ffffff;
        color: #1a1a1a;
        font-family: var(--app-font-family);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      html.dark body {
        background-color: #050505;
        color: #ececec;
      }

      * {
        scrollbar-color: #ddd #f5f5f5;
      }

      html.dark * {
        scrollbar-color: #222 #000;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--neon-color);
        box-shadow: 0 0 8px var(--neon-color);
      }

      html.dark ::-webkit-scrollbar-thumb {
        background: #222;
      }

      .scrollbar-hidden::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hidden {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .prose pre {
        background-color: #000000 !important;
        border: 0px;
        border-radius: 0.5rem;
        padding: 1rem;
        margin-top: 1rem;
        margin-bottom: 1rem;
        overflow-x: auto;
      }

      html:not(.dark) .prose pre {
        background-color: #eff1f5 !important;
      }

      .prose .neon-code-block-container {
        background-color: transparent !important;
        border: none;
        border-radius: 1rem;
        padding-top: 1.5rem;
        padding-bottom: 0rem;
        padding-right: 0rem;
        padding-left: 0rem;
        box-shadow: none;
        transition: all 0.3s ease;
        overflow: hidden;
        background: #000000 !important;
        margin: 0 !important;
      }

      html:not(.dark) .prose .neon-code-block-container {
        background: #eff1f5 !important;
      }

      .code-block-wrapper:hover .neon-code-block-container {
        background: #000000 !important;
      }

      html:not(.dark) .code-block-wrapper:hover .neon-code-block-container {
        background: #eff1f5 !important;
      }

      .prose pre[class*="language-"] {
        margin: 0 !important;
        border-radius: 0.5rem !important;
      }
      .prose code {
        background-color: rgba(var(--neon-rgb), 0.08);
        color: var(--neon-color);
        border-radius: 0.25rem;
        padding: 0.15em 0.4em;
        font-size: 0.875em;
      }

      html:not(.dark) .prose code {
        color: inherit;
        background-color: rgba(var(--neon-rgb), 0.1);
      }
      .prose pre code {
        background-color: transparent;
        color: inherit;
        padding: 0;
      }
      .prose p {
        margin-bottom: 1.25em;
      }
      .prose hr {
        margin-top: 3em;
        margin-bottom: 3em;
        border: none;
        border-top: 1px solid rgba(var(--neon-rgb), 0.2);
      }
      .prose strong {
        color: #111;
        text-shadow: none;
      }

      html.dark .prose strong {
        color: #fff;
        text-shadow: 0 0 1px rgba(255,255,255,0.3);
      }
      .prose a {
        color: var(--neon-color);
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      .prose a.no-underline {
        text-decoration: none;
      }

      ::selection {
        background: rgba(var(--neon-rgb), 0.3);
        color: #fff;
      }

      html:not(.dark) ::selection {
        color: #111;
      }

      .glass-panel {
        background: rgba(20, 20, 20, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.04);
      }

      html:not(.dark) .glass-panel {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(0, 0, 0, 0.08);
      }

      .neon-text { color: var(--neon-color); }
      .neon-border { border-color: var(--neon-color); }
      .neon-bg { background-color: var(--neon-color); }
      .neon-shadow { box-shadow: 0 0 20px rgba(var(--neon-rgb), 0.5); }
      .neon-glow {
        box-shadow: 0 0 10px rgba(var(--neon-rgb), 0.2),
                    0 0 20px rgba(var(--neon-rgb), 0.1);
      }
      .neon-secondary-text { color: var(--neon-secondary); }
      .neon-secondary-bg { background-color: var(--neon-secondary); }
      .neon-accent-text { color: var(--neon-accent); }
      .neon-accent-bg { background-color: var(--neon-accent); }

      /* Smooth transitions for dark/light mode */
      html {
        transition: background-color 0.3s ease;
      }

      /* Focus ring override */
      input:focus-visible, textarea:focus-visible, select:focus-visible, button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px rgba(var(--neon-rgb), 0.3);
        border-radius: inherit;
      }

      /* KaTeX math styling */
      .katex-display {
        margin: 1.2em 0 !important;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 0.5em 0;
      }

      .katex-display > .katex {
        white-space: normal;
      }

      .katex {
        font-size: 1.05em;
        color: inherit;
      }

      html.dark .katex {
        color: #e2e8f0;
      }

      .katex-display > .katex {
        text-align: left;
      }

      /* Inline math styling */
      .katex-inline {
        padding: 0 0.15em;
      }

      /* Math code block styling */
      .math-display {
        background: rgba(var(--neon-rgb), 0.04);
        border: 1px solid rgba(var(--neon-rgb), 0.12);
        border-radius: 0.75rem;
        padding: 1.25rem 1.5rem;
        margin: 1.2em 0;
        overflow-x: auto;
      }

      html:not(.dark) .math-display {
        background: rgba(var(--neon-rgb), 0.06);
      }

      .math-display .katex {
        font-size: 1.1em;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
